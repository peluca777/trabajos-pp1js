<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketApp — Editar evento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">🎵 TicketApp</a>
    <div class="nav-links">
      <a href="index.html">Eventos</a>
      <a href="favoritos.html">⭐ Favoritos</a>
      <a href="agregar.html" class="btn-nav-cta">+ Añadir evento</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>Editar evento</h1>
      <p>Modificá los datos del evento</p>
    </div>

    <div class="form-card">
      <div class="form-group">
        <label for="nombre">Nombre del evento</label>
        <input type="text" id="nombre" placeholder="Ej: Lollapalooza 2026">
      </div>
      <div class="form-group">
        <label for="artista">Artista o banda</label>
        <input type="text" id="artista" placeholder="Ej: Coldplay">
      </div>
      <div class="form-group">
        <label for="lugar">Lugar</label>
        <input type="text" id="lugar" placeholder="Ej: Luna Park, Buenos Aires">
      </div>
      <div class="form-group">
        <label for="precio">Precio ($)</label>
        <input type="number" id="precio" placeholder="Ej: 25000" min="0">
      </div>
      <div class="form-group">
        <label for="imagen">Cambiar imagen (opcional)</label>
        <input type="file" id="imagen" accept="image/*">
        <img id="preview-imagen" src="" alt="" style="display:none; margin-top:10px; max-width:200px; border-radius:8px;">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary btn-large" onclick="guardarEdicion()">Guardar cambios</button>
        <button class="btn btn-ghost btn-large" onclick="window.location.href='index.html'">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script>
    cargarDatosEdicion()
  </script>
</body>
</html>
