<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketApp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a class="nav-logo" href="#" onclick="mostrarSeccion('eventos')">
      <img src="logo/logo.png" alt="TicketApp">
    </a>
    <div class="nav-links">
      <a href="#" id="nav-eventos" class="active" onclick="mostrarSeccion('eventos')">Eventos</a>
      <a href="#" id="nav-favoritos" onclick="mostrarSeccion('favoritos')">⭐ Favoritos</a>
      <a href="#" class="btn-nav-cta" onclick="mostrarSeccion('agregar')">+ Añadir evento</a>
    </div>
  </nav>

  <!-- SECCION: lista de eventos -->
  <div id="seccion-eventos" class="page">
    <div class="page-header">
      <h1>Próximos eventos</h1>
      <p>Encontrá los mejores shows y recitales</p>
    </div>
    <div id="lista-eventos" class="eventos-grid"></div>
  </div>

  <!-- SECCION: agregar evento -->
  <div id="seccion-agregar" class="page" style="display:none">
    <div class="page-header">
      <h1>Añadir evento</h1>
      <p>Completá los datos del nuevo evento</p>
    </div>
    <div class="form-card">
      <div class="form-group">
        <label for="agregar-nombre">Nombre del evento</label>
        <input type="text" id="agregar-nombre" placeholder="Ej: Lollapalooza 2026">
      </div>
      <div class="form-group">
        <label for="agregar-artista">Artista o banda</label>
        <input type="text" id="agregar-artista" placeholder="Ej: Coldplay">
      </div>
      <div class="form-group">
        <label for="agregar-lugar">Lugar</label>
        <input type="text" id="agregar-lugar" placeholder="Ej: Luna Park, Buenos Aires">
      </div>
      <div class="form-group">
        <label for="agregar-precio">Precio ($)</label>
        <input type="number" id="agregar-precio" placeholder="Ej: 25000" min="0">
      </div>
      <div class="form-group">
        <label for="agregar-imagen">Imagen del evento (opcional)</label>
        <input type="file" id="agregar-imagen" accept="image/*">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary btn-large" onclick="crearEvento()">Guardar evento</button>
        <button class="btn btn-ghost btn-large" onclick="mostrarSeccion('eventos')">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- SECCION: editar evento -->
  <div id="seccion-editar" class="page" style="display:none">
    <div class="page-header">
      <h1>Editar evento</h1>
      <p>Modificá los datos del evento</p>
    </div>
    <div class="form-card">
      <div class="form-group">
        <label for="editar-nombre">Nombre del evento</label>
        <input type="text" id="editar-nombre" placeholder="Ej: Lollapalooza 2026">
      </div>
      <div class="form-group">
        <label for="editar-artista">Artista o banda</label>
        <input type="text" id="editar-artista" placeholder="Ej: Coldplay">
      </div>
      <div class="form-group">
        <label for="editar-lugar">Lugar</label>
        <input type="text" id="editar-lugar" placeholder="Ej: Luna Park, Buenos Aires">
      </div>
      <div class="form-group">
        <label for="editar-precio">Precio ($)</label>
        <input type="number" id="editar-precio" placeholder="Ej: 25000" min="0">
      </div>
      <div class="form-group">
        <label for="editar-imagen">Cambiar imagen (opcional)</label>
        <input type="file" id="editar-imagen" accept="image/*">
        <img id="editar-preview" src="" alt="" style="display:none; margin-top:10px; max-width:200px; border-radius:8px;">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary btn-large" onclick="guardarEdicion()">Guardar cambios</button>
        <button class="btn btn-ghost btn-large" onclick="mostrarSeccion('eventos')">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- SECCION: favoritos -->
  <div id="seccion-favoritos" class="page" style="display:none">
    <div class="page-header">
      <h1>Mis favoritos</h1>
      <p>Los eventos que guardaste</p>
    </div>
    <div id="lista-favoritos" class="eventos-grid"></div>
  </div>

  <!-- SECCION: comprar entradas -->
  <div id="seccion-comprar" class="page" style="display:none">
    <div id="contenido-compra"></div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>
    <p>&copy; 2025 TicketApp. Todos los derechos reservados.</p>
  </footer>

  <script src="app.js"></script>

</body>
</html>
